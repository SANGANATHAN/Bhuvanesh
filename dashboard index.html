<!DOCTYPE html>
<html>
<head>
<title>FreshMart Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#0f172a,#020617);
overflow:hidden;
z-index:-1;
}

.bg span{
position:absolute;
width:100px;
height:100px;
background:gold;
border-radius:50%;
opacity:0.5;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-1000px);}
}

/* LOGIN */
.login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
padding:30px;
border-radius:15px;
text-align:center;
box-shadow:0 0 25px gold;
}

.login h2{
color:gold;
}

input{
width:220px;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
background:gold;
border:none;
border-radius:8px;
cursor:pointer;
}

/* DASHBOARD */
.dashboard{
display:none;
padding:20px;
}

.cards{
display:flex;
gap:10px;
}

.card{
flex:1;
padding:15px;
border-radius:10px;
background:linear-gradient(45deg,#06b6d4,#3b82f6);
text-align:center;
}

.charts{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.chart-box{
background:#1e293b;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<!-- LOGIN -->
<div class="login" id="login">
<h2>FreshMart</h2>
<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
<p id="error" style="color:red"></p>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dash">
<h1>Dashboard</h1>

<div class="cards">
<div class="card">Sales ₹83K</div>
<div class="card">Profit ₹15K</div>
<div class="card">Orders 120</div>
<div class="card">Customers 80</div>
</div>

<div class="charts">

<div class="chart-box"><canvas id="c1"></canvas></div>
<div class="chart-box"><canvas id="c2"></canvas></div>
<div class="chart-box"><canvas id="c3"></canvas></div>
<div class="chart-box"><canvas id="c4"></canvas></div>
<div class="chart-box"><canvas id="c5"></canvas></div>
<div class="chart-box"><canvas id="c6"></canvas></div>

</div>
</div>

<script>

/* BACKGROUND DOTS */
for(let i=0;i<15;i++){
let s=document.createElement("span");
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.animationDuration=(5+Math.random()*5)+"s";
document.getElementById("bg").appendChild(s);
}

/* LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("login").style.display="none";
document.getElementById("dash").style.display="block";

/* IMPORTANT DELAY (Fix chart issue) */
setTimeout(loadCharts,100);

}else{
document.getElementById("error").innerText="Invalid Login!";
}
}

/* CHARTS */
function loadCharts(){

new Chart(document.getElementById("c1"),{
type:'bar',
data:{
labels:["Rice","Milk","Snacks"],
datasets:[{
data:[10,20,30],
backgroundColor:["red","green","blue"]
}]
}
});

new Chart(document.getElementById("c2"),{
type:'pie',
data:{
labels:["Snacks","Drinks","Meals"],
datasets:[{
data:[40,30,30],
backgroundColor:["yellow","pink","cyan"]
}]
}
});

new Chart(document.getElementById("c3"),{
type:'line',
data:{
labels:["Jan","Feb","Mar"],
datasets:[{
data:[5,15,10],
borderColor:"lime"
}]
}
});

new Chart(document.getElementById("c4"),{
type:'doughnut',
data:{
labels:["Online","Store"],
datasets:[{
data:[60,40],
backgroundColor:["blue","orange"]
}]
}
});

new Chart(document.getElementById("c5"),{
type:'bar',
data:{
labels:["Veg","NonVeg"],
datasets:[{
data:[25,15],
backgroundColor:["green","red"]
}]
}
});

new Chart(document.getElementById("c6"),{
type:'line',
data:{
labels:["Mon","Tue","Wed"],
datasets:[{
data:[12,18,10],
borderColor:"gold"
}]
}
});

}

</script>

</body>
</html>
